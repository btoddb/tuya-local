name: Atomi Coffee Maker
products:
  - id: 000002cuuc
    manufacturer: Atomi
    name: Atomi Smart WiFi Coffee Maker
  - id: gmbbmrpkqecjoeoa
    manufacturer: Atomi
    name: Atomi Smart WiFi Coffee Maker

entities:
  - entity: binary_sensor
    # power status - read only
    name: Brewing
    category: diagnostic
    dps:
      - id: 1
        type: boolean
        name: sensor

  - entity: select
    # brew strength (mode) - read/write
    name: Brew strength
    category: config
    dps:
      - id: 2
        type: string
        name: option
        mapping:
          - dps_val: smart
            value: Regular
          - dps_val: auto
            value: Strong

  - entity: sensor
    # status of the machine: Off, Brewing, Warming - read only
    name: Status
    class: enum
    category: diagnostic
    dps:
      - id: 3
        type: string
        name: sensor
        mapping:
          - dps_val: status1
            value: Idle
          - dps_val: status2
            value: Brewing
          - dps_val: status3
            value: Warming
          - dps_val: status4
            value: Unknown

  - entity: binary_sensor
    # bit 2 (value = 4), caraf not on base - read only
    name: Caraf not on base
    class: problem
    category: diagnostic
    dps:
      - id: 6
        type: bitfield
        name: sensor
        mapping:
          - dps_val: 0
            value: false
          - dps_val: 4
            value: true

  - entity: sensor
    # value of fault - remove when figured out what bits 0 and 1 mean (bit 2 is caraf not on base) - read only
    #    - hidden doesn't seem to work. just adds "(hidden)" to the name of the entity but doesn't disable the entity
    name: Raw fault status
    category: diagnostic
    hidden: true
    dps:
      - id: 6
        type: bitfield
        name: sensor

  - entity: sensor
    # amount of water in the tank - readonly - not working, just shows 0ml.  Once brewing is started, then the woter
    #   level will be >= 0 if there isn't enough water in the tank - readonly - hidden doesn't seem to work.
    #   just adds "(hidden)" to the name of the entity but doesn't disable the entity
    name: Water Level
    category: diagnostic
    hidden: true
    dps:
      - id: 18
        type: integer
        name: sensor
        unit: ml
        range:
          min: 0
          max: 500

#  - entity: time
#    # time - read only - didn't work
#    name: Time
#    category: diagnostic
#    dps:
#      - id: 102
#        type: integer
#        name: value

  - entity: button
    name: Start Brewing
    # The switch may or may not turn on the machine.  If there isn't enough water or caraf is missing, then
    #   HA will show the switch as ON, but the machine will remain OFF
    icon: "mdi:coffee-maker"
    dps:
      - id: 103
        type: boolean
        name: button

#  - entity: sensor
#    # countdown - read only - didn't work
#    name: Time
#    category: diagnostic
#    dps:
#      - id: 104
#        type: integer
#        name: sensor

  - entity: button
    # calibration - sets the time when called - should be a button
    name: Set Time
#    category: config
    dps:
      - id: 105
        type: string
        name: button
        mapping:
          - dps_val: calibration
            value: calibration
