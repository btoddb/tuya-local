name: Atomi Coffee Maker
products:
  - id: 000002cuuc
    manufacturer: Atomi
    name: Atomi Smart WiFi Coffee Maker
  - id: gmbbmrpkqecjoeoa
    manufacturer: Atomi
    name: Atomi Smart WiFi Coffee Maker

entities:
  - entity: binary_sensor
    # power status - read only
    name: Brewing
    category: diagnostic
    dps:
      - id: 1
        type: boolean
        name: sensor

  - entity: select
    # brew strength (mode) - read/write
    name: Brew strength
    category: config
    dps:
      - id: 2
        type: string
        name: option
        mapping:
          - dps_val: smart
            value: Regular
          - dps_val: auto
            value: Strong

  - entity: sensor
    # status of the machine: Off, Brewing, Warming - read only
    name: Status
    class: enum
    category: diagnostic
    dps:
      - id: 3
        type: string
        name: sensor
        mapping:
          - dps_val: status1
            value: Idle
          - dps_val: status2
            value: Brewing
          - dps_val: status3
            value: Warming
          - dps_val: status4
            value: Unknown

