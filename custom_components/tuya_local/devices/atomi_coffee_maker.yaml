  - entity: sensor
    # value of fault - remove when figured out what bits 0 and 1 mean (bit 2 is caraf not on base) - read only
    name: fault status
    category: diagnostic
    dps:
      - id: 6
        type: bitfield
        name: sensor

  - entity: sensor
    # not working, just shows 0ml - readonly
    name: Water Level
    category: diagnostic
    dps:
      - id: 18
        type: integer
        name: sensor
        unit: ml
        range:
          min: 0
          max: 500

